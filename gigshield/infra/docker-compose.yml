version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigshield_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield"]
      interval: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend:/app
      - ../data:/data

  ml-premium:
    build:
      context: ../backend/ml/premium
      dockerfile: Dockerfile
    command: uvicorn serve:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ../backend/ml/premium:/app
      - ../data:/data

  ml-forecast:
    build:
      context: ../backend/ml/forecast
      dockerfile: Dockerfile
    command: uvicorn serve:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"

  ml-cnn:
    build:
      context: ../backend/ml/cnn_verify
      dockerfile: Dockerfile
    command: uvicorn serve:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"

  rider-pwa:
    build:
      context: ../frontend/rider-pwa
      dockerfile: Dockerfile
    ports:
      - "3000:80"

  insurer-dashboard:
    build:
      context: ../frontend/insurer-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:80"

volumes:
  postgres_data:
