# GigShield Nginx Configuration
# Reverse proxy for API + PWA static files

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream api_backend {
    server api:8000;
}

upstream ml_premium {
    server ml-premium:8001;
}

upstream ml_forecast {
    server ml-forecast:8002;
}

upstream ml_cnn {
    server ml-cnn:8003;
}

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API — reverse proxy to FastAPI
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ML Internal services (not exposed publicly in production)
    location /internal/ml/ {
        # Only allow internal network access
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://ml_premium;
        proxy_read_timeout 15s;
    }

    # Rider PWA — static files
    location / {
        root /usr/share/nginx/html/rider-pwa;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Insurer Dashboard — static files
    location /insurer/ {
        alias /usr/share/nginx/html/insurer-dashboard/;
        index index.html;
        try_files $uri $uri/ /insurer/index.html;
    }

    # Health check
    location /health {
        access_log off;
        proxy_pass http://api_backend/health;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
